services:
  - type: web
    name: agrimap-django
    env: docker
    dockerfilePath: ./Dockerfile.django
    dockerContext: .
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: server_agri_map_django.settings.production
      - key: DATABASE_URL
        fromDatabase:
          name: agrimap-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: agri-map-ekyx.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://agri-map-ekyx.onrender.com,https://client-agri-map.pages.dev,http://localhost:3000
      - key: DEBUG
        value: "False"
      - key: GUNICORN_WORKERS
        value: "4"

databases:
  - name: agrimap-db
    databaseName: agrimap
    user: agrimap
    plan: starter
    postgresMajorVersion: 16
