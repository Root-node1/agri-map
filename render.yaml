services:
  # Node.js Backend API
  - type: web
    name: agrimap-node-api
    runtime: node
    plan: free
    buildCommand: cd node-agri-map-server && npm install --legacy-peer-deps
    startCommand: cd node-agri-map-server && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: DJANGO_API_URL
        sync: false
      - key: DJANGO_API_KEY
        sync: false
      - key: WEBHOOK_BASE_URL
        value: https://agrimap-node-api.onrender.com/api/webhooks
      - key: CORS_ORIGIN
        value: https://agrimap-client.onrender.com,https://agrimap-django-api.onrender.com,http://localhost:3000
      - key: LOG_LEVEL
        value: info

  # Django Backend API
  - type: web
    name: agrimap-django-api
    runtime: python
    plan: free
    buildCommand: cd server-agri-map-django && pip install -r requirements.txt || pip install Django==4.2.0 djangorestframework==3.14.0 django-cors-headers
    startCommand: cd server-agri-map-django && gunicorn server_agri_map_django.wsgi:application
    healthCheckPath: /api/health/
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: server_agri_map_django.settings.production
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://agrimap-client.onrender.com,https://agrimap-node-api.onrender.com,https://agri-map-ekyx.onrender.com
      - key: GUNICORN_WORKERS
        value: "4"

  # Frontend Client
  - type: web
    name: agrimap-client
    runtime: node
    plan: free
    buildCommand: cd client-agri-map && npm install --legacy-peer-deps && npm run build || echo "Build skipped"
    startCommand: cd client-agri-map && npm run preview || echo "Preview skipped"
    envVars:
      - key: VITE_API_URL
        value: https://agrimap-node-api.onrender.com/api
      - key: VITE_DJANGO_API_URL
        value: https://agrimap-django-api.onrender.com/api

databases:
  - name: agrimap-db
    databaseName: agrimap
    user: agrimap
    plan: starter
    postgresMajorVersion: 16
