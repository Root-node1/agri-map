services:
  - type: web
    name: agrimap-node-api
    runtime: node
    plan: free
    buildCommand: |
      echo "📦 Installing dependencies..."
      cd node-agri-map-server
      npm install --legacy-peer-deps
      echo "✅ Dependencies installed"
    startCommand: |
      echo "🚀 Starting server..."
      cd node-agri-map-server
      node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: LOG_LEVEL
        value: info
