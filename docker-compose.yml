services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=development

  node-backend:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
    depends_on:
      - client

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: agrimap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  django-backend:
    build:
      context: .
      dockerfile: Dockerfile.django
    ports:
      - "8002:8002"
    env_file:
      - server-agri-map-django/.env
    environment:
      - DJANGO_SETTINGS_MODULE=server_agri_map_django.settings.local
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/agrimap
    depends_on:
      - postgres
      - node-backend

volumes:
  pgdata:
