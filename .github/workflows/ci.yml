name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop, ft-node]
  pull_request:
    branches: [main, master, develop]

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install and test frontend
        working-directory: ./client-agri-map
        run: |
          npm install --legacy-peer-deps || npm install
          npm run lint || echo "Lint skipped"
          npm run build || echo "Build skipped"

  test-node-backend:
    name: Test Node.js Backend
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install and test Node backend
        working-directory: ./node-agri-map-server
        run: |
          npm install --legacy-peer-deps
          npm test || echo "No tests defined yet"
          node test-ai.js || echo "AI test skipped"
      - name: Check Node server health
        working-directory: ./node-agri-map-server
        run: |
          npm start &
          sleep 10
          curl -f http://localhost:3000/health || echo "Health check skipped"
          kill $(jobs -p) || true

  test-django-backend:
    name: Test Django Backend
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        python-version: [3.11]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Django dependencies
        working-directory: ./server-agri-map-django
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt || echo "Dependency install failed"
          else 
            echo "No requirements.txt found"
            pip install Django==4.2.0 djangorestframework==3.14.0
          fi
      - name: Run Django tests
        working-directory: ./server-agri-map-django
        run: |
          if [ -f manage.py ]; then 
            python manage.py test || echo "Django tests failed"
          else 
            echo "No Django app detected"
          fi

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-frontend, test-node-backend, test-django-backend]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build React Docker image
        run: |
          if [ -f Dockerfile.client ]; then
            docker build --file Dockerfile.client --tag agri-map-client:ci . || echo "React build failed"
          else
            echo "Dockerfile.client not found"
          fi
      - name: Build Node backend Docker image
        run: |
          if [ -f Dockerfile.node ]; then
            docker build --file Dockerfile.node --tag agri-map-node:ci . || echo "Node build failed"
          else
            echo "Dockerfile.node not found"
          fi
      - name: Build Django Docker image
        run: |
          if [ -f Dockerfile.django ] && [ -d "server-agri-map-django" ]; then
            docker build --file Dockerfile.django --tag agri-map-django:ci . || echo "Django build failed"
          else
            echo "Dockerfile.django or Django directory not found"
          fi
