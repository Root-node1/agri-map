name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies and run frontend tests
        working-directory: ./client-agri-map
        run: |
          npm ci
          npm run lint
          npm run build

  test-backend:
    name: test-backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install and test Node backend
        working-directory: ./node-agri-map-server
        run: |
          npm ci
          npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Django dependencies
        working-directory: ./server-agri-map-django
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: ./server-agri-map-django
        env:
          DATABASE_URL: sqlite:///test_db.sqlite3
          SECRET_KEY: ci-test-key
          DEBUG: False
          ALLOWED_HOSTS: localhost
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          python manage.py test

  build-docker:
    name: build-docker
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build React Docker image
        run: |
          docker build --file Dockerfile.client --tag agri-map-client:ci .

      - name: Build Node backend Docker image
        run: |
          docker build --file Dockerfile.node --tag agri-map-node:ci .

      - name: Build Django Docker image if Django exists
        run: |
          if [ -f server-agri-map-django/manage.py ] && [ -f server-agri-map-django/requirements.txt ]; then
            docker build --file Dockerfile.django --tag agri-map-django:ci .
          else
            echo "No Django application detected or requirements missing; skipping Django Docker build."
          fi
