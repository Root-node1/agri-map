name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
        python-version: [3.12]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install and test React client
        working-directory: ./client-agri-map
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Install and test Node backend
        working-directory: ./node-agri-map-server
        run: |
          npm ci
          npm test

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Django dependencies
        run: |
          cd server-agri-map-django
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Django tests
        run: |
          cd server-agri-map-django
          if [ -f manage.py ]; then python manage.py test; else echo "No Django app detected, skipping Django test step."; fi
